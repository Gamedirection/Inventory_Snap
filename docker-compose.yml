version: "3.9"

x-backend-env: &backend-env
  POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  POSTGRES_DB: ${POSTGRES_DB:-inventory_snap}
  POSTGRES_USER: ${POSTGRES_USER:-inventory}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
  MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-changeme_minio}
  MINIO_SECURE: ${MINIO_SECURE:-false}
  MINIO_BUCKET_PHOTOS: ${MINIO_BUCKET_PHOTOS:-photos}
  MINIO_BUCKET_THUMBNAILS: ${MINIO_BUCKET_THUMBNAILS:-thumbnails}
  MINIO_BUCKET_DOCUMENTS: ${MINIO_BUCKET_DOCUMENTS:-documents}
  MINIO_BUCKET_EXPORTS: ${MINIO_BUCKET_EXPORTS:-exports}
  MINIO_BUCKET_BACKUPS: ${MINIO_BUCKET_BACKUPS:-backups}
  PUBLIC_MINIO_URL: ${PUBLIC_MINIO_URL:-http://localhost:9000}
  SECRET_KEY: ${SECRET_KEY:-changeme-insecure-dev-key}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
  JWT_ACCESS_EXPIRE_MINUTES: ${JWT_ACCESS_EXPIRE_MINUTES:-60}
  JWT_REFRESH_EXPIRE_DAYS: ${JWT_REFRESH_EXPIRE_DAYS:-30}
  AI_PROVIDER: ${AI_PROVIDER:-ollama}
  AI_FALLBACK_CHAIN: ${AI_FALLBACK_CHAIN:-ollama}
  AI_CONFIDENCE_THRESHOLD: ${AI_CONFIDENCE_THRESHOLD:-0.6}
  AI_MAX_OBJECTS_PER_PHOTO: ${AI_MAX_OBJECTS_PER_PHOTO:-20}
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
  OLLAMA_VISION_MODEL: ${OLLAMA_VISION_MODEL:-llava:13b}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_VISION_MODEL: ${OPENAI_VISION_MODEL:-gpt-4o}
  CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
  CLAUDE_VISION_MODEL: ${CLAUDE_VISION_MODEL:-claude-3-5-sonnet-20241022}
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:80,http://localhost}
  DEBUG: ${DEBUG:-false}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  APP_NAME: ${APP_NAME:-Inventory Snap}
  APP_VERSION: ${APP_VERSION:-0.1.0}

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-inventory_snap}
      POSTGRES_USER: ${POSTGRES_USER:-inventory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inventory} -d ${POSTGRES_DB:-inventory_snap}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── MinIO ───────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-changeme_minio}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - internal
      - public

  # ── MinIO Init (one-shot bucket creation) ───────────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-changeme_minio};
        mc mb --ignore-existing local/photos;
        mc mb --ignore-existing local/thumbnails;
        mc mb --ignore-existing local/documents;
        mc mb --ignore-existing local/exports;
        mc mb --ignore-existing local/backups;
        mc anonymous set download local/thumbnails;
        echo 'MinIO buckets initialized.';
      "
    networks:
      - internal

  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - internal
      - public
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Celery Worker ────────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker -Q default,ai_processing,exports --concurrency 2 --loglevel INFO
    environment:
      <<: *backend-env
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal

  # ── Celery Beat (scheduler) ──────────────────────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.workers.celery_app beat --loglevel INFO --schedule /tmp/celerybeat-schedule
    environment:
      <<: *backend-env
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal

  # ── Flower (Celery monitoring UI) ────────────────────────────────────────────
  flower:
    image: mher/flower:2.0
    restart: unless-stopped
    command: celery flower --broker=${CELERY_BROKER_URL:-redis://redis:6379/1} --port=5555
    environment:
      FLOWER_BASIC_AUTH: ${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-changeme_flower}
    ports:
      - "5555:5555"
    depends_on:
      - redis
    networks:
      - internal
      - public

  # ── Ollama (local vision model) ──────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - internal
    # Uncomment for GPU support (NVIDIA):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ── Nginx (reverse proxy) ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infra/certbot/www:/var/www/certbot:ro
      - ./infra/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - public
      - internal

volumes:
  postgres_data:
  redis_data:
  minio_data:
  ollama_models:

networks:
  internal:
    driver: bridge
  public:
    driver: bridge
