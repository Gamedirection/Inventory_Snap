version: "3.9"

# Development overrides: hot-reload mounts, debug flags, Vite dev server

services:
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    environment:
      DEBUG: "true"
      LOG_LEVEL: DEBUG

  celery-worker:
    volumes:
      - ./backend:/app
    environment:
      DEBUG: "true"

  celery-beat:
    volumes:
      - ./backend:/app

  # Vite dev server (not present in production)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: http://backend:8000
      VITE_MINIO_PUBLIC_URL: http://localhost:9000
    networks:
      - public
      - internal
